name: CI
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.web.json && npx tsc --noEmit -p tsconfig.node.json

      - name: Build application
        run: npm run build

      - name: Build test (Linux AppImage)
        run: npx electron-builder --linux AppImage --publish never
